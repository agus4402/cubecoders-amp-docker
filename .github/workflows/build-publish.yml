name: Build and publish Docker image

on:
  workflow_call:
    inputs:
      amp_version:
        description: "AMP version to build (e.g. 2.7.2.2)"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      amp_version:
        description: "AMP version to build — leave empty to resolve latest"
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve AMP version if not provided
        id: version
        run: |
          VER="${{ inputs.amp_version }}"
          if [ -z "$VER" ]; then
            VER=$(curl -fsSL https://cubecoders.com/AMPVersions.json | jq -r '.AMPCore')
            echo "Resolved latest AMP version: $VER"
          fi
          echo "amp_version=$VER" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: |
            AMP_VERSION=${{ steps.version.outputs.amp_version }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cubecoders-amp:${{ steps.version.outputs.amp_version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/cubecoders-amp:stable
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/cubecoders-amp
          readme-filepath: ./README.md

      - name: Summary
        run: |
          echo "### Build complete" >> "$GITHUB_STEP_SUMMARY"
          echo "Published \`${{ secrets.DOCKERHUB_USERNAME }}/cubecoders-amp:${{ steps.version.outputs.amp_version }}\` and \`:stable\`" >> "$GITHUB_STEP_SUMMARY"
